<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>公众号信息抓取</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
h2{text-align:center;color:#333;margin-bottom:8px;font-size:22px}
.subtitle{text-align:center;color:#999;font-size:13px;margin-bottom:24px}
.input-group{display:flex;gap:8px;margin-bottom:20px}
input[type="text"]{flex:1;padding:12px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;transition:border .2s}
input[type="text"]:focus{border-color:#667eea}
.btn{padding:12px 20px;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;white-space:nowrap}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(102,126,234,.4)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
.btn-full{display:block;width:100%;padding:14px;font-size:16px;margin-bottom:8px}
.result{display:none}
.result.show{display:block}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:#999;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.preview-box{border:2px dashed #e0e0e0;border-radius:10px;padding:20px;text-align:center;margin-bottom:16px;overflow:hidden}
.preview-box img{max-width:100%;max-height:200px;border-radius:6px;display:block;margin:0 auto}
.loading{display:none;text-align:center;color:#999;margin:16px 0;font-size:14px}
.loading.show{display:block}
.loading .spinner{display:inline-block;width:20px;height:20px;border:2px solid #e0e0e0;border-top-color:#667eea;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="card">
  <h2>公众号信息抓取</h2>
  <p class="subtitle">粘贴文章链接，自动获取标题和封面</p>
  <div class="input-group">
    <input type="text" id="inputUrl" placeholder="粘贴微信公众号文章链接...">
    <button class="btn btn-primary" id="fetchBtn" onclick="getInfo()">获取封面+标题</button>
  </div>
  <div class="loading" id="loading"><span class="spinner"></span>正在抓取...</div>
  <div class="result" id="result">
    <div class="field"><label>文章标题</label><input id="titleInput" type="text" placeholder="输入或修改标题"></div>
    <div class="field"><label>封面图片</label>
      <div class="preview-box">
        <img id="cover" src="" style="display:none" onerror="this.style.display='none';document.getElementById('noCover').style.display='block'">
        <div id="noCover" style="display:none;color:#ccc;font-size:13px">暂未获取到封面</div>
        <div id="coverPlaceholder" class="preview-placeholder" style="color:#ccc;font-size:13px">点击获取后将显示封面</div>
      </div>
    </div>
    <button class="btn btn-primary btn-full" id="useBtn" onclick="goBack()">使用此信息</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var returnUrl = decodeURIComponent((location.search.match(/return=([^&]+)/)||['',''])[1]||'');
if(!returnUrl){try{returnUrl=document.referrer}catch(e){}}

var urlInput = document.getElementById('inputUrl');
var defaultUrl = decodeURIComponent((location.search.match(/url=([^&]+)/)||['',''])[1]||'');
urlInput.value = defaultUrl;

if(defaultUrl.trim()){setTimeout(getInfo,300)}

var coverDataUrl = '';

async function getInfo() {
  var url = document.getElementById("inputUrl").value.trim();
  if (!url) { showToast("请输入链接"); return; }
  
  var btn = document.getElementById('fetchBtn');
  btn.disabled = true; btn.textContent = '抓取中...';
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').classList.remove('show');
  
  try {
    var api = 'https://opengraph.io/api/1.1/site/' + encodeURIComponent(url) + '?app_id=YOUR_APP_ID';
    var res = await fetch(api);
    var data = await res.json();
    
    document.getElementById('loading').classList.remove('show');
    btn.disabled = false; btn.textContent = '获取封面+标题';
    
    if (data.error) { showToast('获取失败: ' + data.error.message); return; }
    
    var title = (data.hybridGraph || data.openGraph || {}).title || data.title || '';
    var cover = (data.hybridGraph || data.openGraph || {}).image?.url || data.image || '';
    if (typeof cover === 'object') cover = cover.url || '';
    
    document.getElementById('titleInput').value = title || '';
    
    if (cover) {
      document.getElementById('cover').src = cover;
      document.getElementById('cover').style.display = 'block';
      document.getElementById('noCover').style.display = 'none';
      document.getElementById('coverPlaceholder').style.display = 'none';
    } else {
      document.getElementById('cover').style.display = 'none';
      document.getElementById('noCover').style.display = 'block';
      document.getElementById('coverPlaceholder').style.display = 'none';
    }
    
    document.getElementById('result').classList.add('show');
    showToast(title ? '获取成功！' : '已获取（未找到标题）');
  } catch (e) {
    document.getElementById('loading').classList.remove('show');
    btn.disabled = false; btn.textContent = '获取封面+标题';
    document.getElementById('result').classList.add('show');
    showToast('网络错误，请重试');
    console.error(e);
  }
}

function goBack() {
  var title = document.getElementById('titleInput').value.trim();
  if (!title) { showToast('请输入标题'); return; }
  var coverImg = document.getElementById('cover');
  var coverSrc = coverImg.src;
  if (coverSrc === window.location.href || !coverSrc || coverSrc.endsWith('#')) coverSrc = '';
  
  var back = returnUrl || 'https://dengxiaoyuovo.github.io/pyqzan/#/pages/edit/edit?type=2';
  back += (back.includes('?')?'&':'?') + 'title=' + encodeURIComponent(title);
  if (coverSrc && !coverSrc.startsWith('data:')) {
    back += '&cover=' + encodeURIComponent(coverSrc);
  }
  location.href = back;
}

function showToast(msg) {
  var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')}, 2000);
}
</script>
</body>
</html>
