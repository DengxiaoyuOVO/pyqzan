<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>抓取公众号信息</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh}.card{background:#fff;border-radius:12px;padding:30px;width:90%;max-width:420px;box-shadow:0 2px 12px rgba(0,0,0,.1);text-align:center}h2{color:#1677ff;margin-bottom:20px}input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px}.preview{width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin:12px 0;border:1px solid #eee}.btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin-bottom:8px}.btn-primary{background:#1677ff;color:#fff}.btn-secondary{background:#f0f0f0;color:#333}.loading{display:none;color:#999;margin:12px 0}.result{display:none}.divider{color:#999;margin:16px 0;font-size:13px}label{display:block;text-align:left;font-size:13px;color:#666;margin-bottom:4px}</style></head><body><div class="card"><h2>📎 抓取公众号信息</h2><label>文章链接</label><input id="url" type="text" placeholder="粘贴微信公众号文章链接..."><button class="btn btn-primary" onclick="fetchArticle()">自动抓取</button><div class="loading" id="loading">⏳ 抓取中...</div><div class="result" id="result"><label>文章标题</label><input id="title" type="text" placeholder="输入或修改标题"><label>封面图片</label><img id="cover" class="preview" src="" onerror="this.style.display='none'" style="display:none"><button class="btn btn-secondary" onclick="chooseCover()">选择本地封面图</button><button class="btn btn-primary" onclick="goBack()">✅ 使用此信息</button></div></div><script>var returnUrl=decodeURIComponent((location.search.match(/return=([^&]+)/)||[,''])[1]||'');if(!returnUrl){try{returnUrl=document.referrer}catch(e){}}document.getElementById('url').value=decodeURIComponent((location.search.match(/url=([^&]+)/)||[,''])[1]||'');if(document.getElementById('url').value.trim()){fetchArticle();}async function fetchArticle(){var u=document.getElementById('url').value.trim();if(!u){alert('请粘贴链接');return}document.getElementById('loading').style.display='block';try{var r=await fetch('/getWeiDate?url='+encodeURIComponent(u));var d=await r.json();document.getElementById('loading').style.display='none';if(d.success){document.getElementById('title').value=d.title||'';if(d.cover){document.getElementById('cover').src=d.cover;document.getElementById('cover').style.display='block'}showResult();return}}catch(e){console.log('SW fetch failed:',e)}try{var r2=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(u));var h=await r2.text();document.getElementById('loading').style.display='none';var ti=(h.match(/<title>([^<]+)</title>/i)||[,''])[1]||'';var ci=(h.match(/<metas+property=["']og:image["']s+content=["']([^"']+)["']/i)||[,''])[1]||'';document.getElementById('title').value=ti;if(ci){document.getElementById('cover').src=ci;document.getElementById('cover').style.display='block'}showResult()}catch(e){console.log('allorigins failed:',e);try{var r3=await fetch('https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u));var h2=await r3.text();document.getElementById('loading').style.display='none';var ti2=(h2.match(/<title>([^<]+)</title>/i)||[,''])[1]||'';var ci2=(h2.match(/<metas+property=["']og:image["']s+content=["']([^"']+)["']/i)||[,''])[1]||'';document.getElementById('title').value=ti2;if(ci2){document.getElementById('cover').src=ci2;document.getElementById('cover').style.display='block'}showResult()}catch(e2){console.log('all failed');document.getElementById('loading').style.display='none';alert('自动抓取失败，请手动填写标题和选择封面图');showResult()}}}function showResult(){document.getElementById('result').style.display='block'}function chooseCover(){var input=document.createElement('input');input.type='file';input.accept='image/*';input.onchange=function(e){var file=e.target.files[0];if(file){var reader=new FileReader();reader.onload=function(ev){document.getElementById('cover').src=ev.target.result;document.getElementById('cover').style.display='block'};reader.readAsDataURL(file)}};input.click()}function goBack(){var t=document.getElementById('title').value.trim();if(!t){alert('请输入标题');return}var c=document.getElementById('cover').src;var back=returnUrl||('https://dengxiaoyuovo.github.io/pyqzan/#/pages/edit/edit?type=2');back+=(back.includes('?')?'&':'?')+'title='+encodeURIComponent(t);if(c&&!c.startsWith('data:'))back+='&cover='+encodeURIComponent(c);location.href=back}</script></body></html>
